name: CI

# Run once per change: `pull_request` covers branches/PRs, `push` only on main
# (post-merge). Scoping push to main avoids the double run you'd get when a
# same-repo branch has an open PR (push + pull_request both firing).
on:
  push:
    branches: [main]
  pull_request:

# Supersede in-progress runs for the same ref (the VM tests are expensive).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      # The NixOS VM tests (modules / runtime / extension) boot QEMU, so the
      # runner needs KVM access — and three NixOS closures overflow the default
      # ~14 GB disk, so reclaim space first. (Both unnecessary for a pure-eval
      # flake like xnixvim; required here because we run VM tests.)
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Builds all packages, runs the NixOS VM tests + TypeScript unit tests,
      # and checks formatting.
      - run: nix flake check --no-write-lock-file
