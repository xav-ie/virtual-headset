name: Version

# Changesets-driven release automation. On push to main:
#   * pending .changeset/*.md  -> open/update the "chore: version packages" PR
#     (bumps the version, syncs it into the manifest, writes CHANGELOG.md).
#   * none pending             -> run `npm run tag`, which tags v<version> and
#     pushes it, triggering release.yml (sign + publish the .xpi).
#
# Auth is a GitHub App installation token (APP_ID / APP_PRIVATE_KEY): the Version
# PR is opened by the app's bot, and app-token tag pushes still trigger
# release.yml (the no-trigger restriction only applies to the default
# GITHUB_TOKEN, not to apps or PATs).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version
  cancel-in-progress: false

jobs:
  version:
    if: github.repository == 'xav-ie/virtual-headset'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Author commits as the app's bot so they match the PR author. The bot's
      # user id (needed for the noreply email) comes from the users API.
      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug="${{ steps.app-token.outputs.app-slug }}"
          id=$(gh api "/users/${slug}[bot]" --jq .id)
          git config user.name "${slug}[bot]"
          git config user.email "${id}+${slug}[bot]@users.noreply.github.com"

      - name: Create Version PR or tag a release
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run tag
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
